- word: dondolare
  forms:
    - word: ''
      pos:
        - v. tr.
      syl: don-do-là-re
      props:
        pres: io dóndolo
      tags:
        - italiano fondamentale
      hints:
        - (piedi, gambe) to swing, (culla, sedia, bambino) to rock, (corda) to dangle, (testa) to nod
      senses:
        - glosses:
            - gloss: far muovere in qua e in là una cosa sospesa, in equilibrio instabile o con un unico punto d'appoggio
              tags: null
              props: null
              examples:
                - dondolare una corda, una sedia
                - dondolare la testa, la coda
              phrases: null
            - gloss: cullare
              tags: null
              props: null
              examples:
                - dondolare un bambino
              phrases: null
    - word: ''
      pos:
        - v. intr.
      syl: don-do-là-re
      props:
        aus: avere
      tags:
        - italiano fondamentale
      hints: &dondolare_hints
        - "(muoversi oscillando: su una sedia) to rock, (sull'altalena) to swing"
        - fig. (oziare) to laze around
      senses: &dondolare_senses
        - glosses:
            - gloss: muoversi oscillando o ciondolando
              tags: null
              props: null
              examples:
                - l'altalena dondola
                - dondolare da una parte e dall'altra
                - dondolarsi pigramente su una sedia
              phrases: null
        - glosses:
            - gloss: star bighelloni, senza far niente
              tags:
                - fig.
              props:
                sin: gingillarsi, oziare
              examples:
                - non fa che dondolarsi tutto il giorno per la casa
              phrases: null
    - word: 'dondolarsi'
      pos:
        - v. rifl.
      syl: don-do-làr-si,
      props:
        aus: essere
      tags:
        - italiano fondamentale
      hints: *dondolare_hints
      senses: *dondolare_senses